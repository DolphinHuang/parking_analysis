services:
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: parking-timescaledb
    environment:
      POSTGRES_DB: ${DB_NAME:-parking_analysis}
      POSTGRES_USER: ${DB_USER:-parking_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-parking_password}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-parking_user} -d ${DB_NAME:-parking_analysis}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  collector:
    build: .
    container_name: parking-collector
    env_file:
      - .env.docker
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: [ "uv", "run", "python", "-m", "collector.main" ]

volumes:
  timescaledb_data:
